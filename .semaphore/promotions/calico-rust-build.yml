version: v1.0
name: Publish calico/rust-build images
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

execution_time_limit:
  minutes: 60

global_job_config:
  env_vars:
    - name: DEV_REGISTRIES
      value: calico
  secrets:
    - name: docker
  prologue:
    commands:
      - echo $DOCKER_TOKEN | docker login --username "$DOCKER_USER" --password-stdin
      - checkout
      - export BRANCH_NAME=$(yq -r '.rust.version' images/calico-rust-build/versions.yaml)

blocks:
  - name: Publish calico/rust-build images
    dependencies: []
    run:
      when: "branch = 'master' AND change_in('/images/calico-rust-build/')"
    task:
      jobs:
        - name: Linux amd64
          commands:
            - if [ -z "${SEMAPHORE_GIT_PR_NUMBER}" ]; then make -C images calico-rust-build-cd CONFIRM=true; fi
